name: Feature request
description: Suggest an improvement to RosterFocus.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Open-ended ideas and discussion are welcome in [Discussions](../../discussions).
        Use this for a concrete, scoped change.

        Note the hard limits: an app can't *create* a Focus or set one directly (only the
        Shortcuts app can), so requests that need those aren't possible — RosterFocus
        automates the *decision* and runs your Shortcut.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should RosterFocus be able to do?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why is this useful? What shift/Focus setup would use it?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where would it live?
      options:
        - Menu-bar app
        - Python CLI
        - Both
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Can it be done today with rules/keywords/lead-trail? What did you try?
    validations:
      required: false
