name: Bug report
description: Something in RosterFocus behaves incorrectly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! A clear repro is the single biggest factor in getting it fixed.
        Questions and "how do I…" go to [Discussions](../../discussions), not here.
  - type: dropdown
    id: surface
    attributes:
      label: Which part?
      options:
        - Menu-bar app
        - Python CLI / launchd
        - Both
        - Not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: I added a Work rule and started a shift event, but the Work Focus never turns on…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Number the steps so a maintainer can trigger it.
      placeholder: |
        1. Create a "Work" Focus + the Work Focus On/Off shortcuts
        2. Add a rule: calendar "Work" → focus "Work"
        3. Put a calendar event happening now on "Work"
        4. Click "Check Now" (app) or run rosterfocus.py
        5. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What should have happened, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`--doctor` output (CLI), or app version"
      description: Paste `python3 rosterfocus.py --doctor`, or the app version (menu → about / Get Info).
      render: text
    validations:
      required: false
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 15.1 (Sequoia)
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Logs, screenshots, whether "Share Across Devices" is on, calendar source (iCloud/Google/…).
    validations:
      required: false
