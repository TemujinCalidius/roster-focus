name: Release

# On a version tag, cross-post the release to Discussions → Announcements.
#
# The maintainer cuts the release itself (notes + the notarized RosterFocus.dmg,
# built locally via app/scripts/package-notarize.sh) with `gh release create` — see
# CONTRIBUTING.md. This workflow only ensures the Announcements discussion exists; it
# does NOT set the body or generate notes, so it can't clobber the maintainer's notes.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  discussions: write

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Cross-post release to Discussions → Announcements
        uses: softprops/action-gh-release@v2
        with:
          discussion_category_name: Announcements
          # rc / beta tags (e.g. v1.1.0-rc1) are marked as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
